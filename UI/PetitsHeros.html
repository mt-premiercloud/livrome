<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetitsHéros — Design exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@300..700&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
  <style>
/* PetitsHéros — design tokens */
:root {
  /* Brand */
  --plum: #5B2A6F;
  --plum-deep: #3F1C4F;
  --plum-soft: #7B4A8E;
  --cream: #FFF8EC;
  --cream-deep: #F5ECD9;
  --honey: #F4B942;
  --honey-deep: #D99A25;
  --sage: #8FB996;
  --sage-deep: #6B9072;
  --rose: #E8B4B8;
  --rose-deep: #C98A8F;

  /* Neutrals */
  --ink: #1E1A17;
  --charcoal: #2A2A2A;
  --graphite: #4E453E;
  --stone: #7A716A;
  --pebble: #B8AEA5;
  --bone: #EDE5D6;
  --paper: #FBF7EE;
  --white: #FFFFFF;

  /* Semantic */
  --success: #6BAA75;
  --error: #C44536;
  --warn: #D99A25;

  /* Radii */
  --r-card: 14px;
  --r-card-lg: 20px;
  --r-pill: 999px;
  --r-input: 10px;
  --r-chip: 8px;

  /* Shadows */
  --shadow-xs: 0 1px 2px rgba(42, 20, 58, 0.06);
  --shadow-sm: 0 2px 8px rgba(42, 20, 58, 0.06), 0 1px 2px rgba(42, 20, 58, 0.04);
  --shadow-md: 0 8px 24px rgba(42, 20, 58, 0.08), 0 2px 6px rgba(42, 20, 58, 0.05);
  --shadow-lg: 0 20px 48px rgba(42, 20, 58, 0.12), 0 8px 16px rgba(42, 20, 58, 0.06);
  --shadow-honey: 0 8px 20px rgba(244, 185, 66, 0.32);

  /* Type */
  --f-display: "Fraunces", "Cormorant Garamond", Georgia, serif;
  --f-body: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --f-hand: "Caveat", "Bradley Hand", cursive;

  /* Motion */
  --ease-out: cubic-bezier(0.2, 0.7, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--f-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--paper);
}

/* Scrollbar hide for artboard inner scroll */
.artboard-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.12) transparent; }
.artboard-scroll::-webkit-scrollbar { width: 6px; }
.artboard-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

/* Focus rings (a11y) */
.focus-ring:focus-visible { outline: 2px solid var(--plum); outline-offset: 3px; border-radius: 4px; }

/* Reusable primitives */
.ph-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: 0; cursor: pointer; font-family: var(--f-body);
  font-weight: 600; letter-spacing: -0.01em;
  border-radius: var(--r-pill);
  transition: transform .18s var(--ease-out), box-shadow .18s var(--ease-out), background .18s var(--ease-out), color .18s var(--ease-out);
  white-space: nowrap;
}
.ph-btn:hover { transform: scale(1.02); }
.ph-btn:active { transform: scale(0.97); }
.ph-btn--primary {
  background: var(--honey); color: var(--ink);
  padding: 14px 28px; font-size: 16px;
  box-shadow: var(--shadow-honey);
}
.ph-btn--primary:hover { background: var(--honey-deep); }
.ph-btn--secondary {
  background: transparent; color: var(--plum);
  padding: 13px 26px; font-size: 15px;
  box-shadow: inset 0 0 0 1.5px var(--plum);
}
.ph-btn--secondary:hover { background: var(--plum); color: var(--cream); }
.ph-btn--ghost {
  background: transparent; color: var(--plum);
  padding: 10px 18px; font-size: 14px;
}
.ph-btn--ghost:hover { background: rgba(91, 42, 111, 0.06); }
.ph-btn--sage {
  background: var(--sage); color: var(--cream);
  padding: 12px 22px; font-size: 14px;
}
.ph-btn--sage:hover { background: var(--sage-deep); }
.ph-btn--sm { padding: 9px 18px; font-size: 13px; }
.ph-btn--lg { padding: 16px 34px; font-size: 17px; }

.ph-input {
  width: 100%;
  padding: 13px 16px;
  border-radius: var(--r-input);
  border: 1.5px solid var(--bone);
  background: var(--white);
  font-family: var(--f-body); font-size: 15px;
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
.ph-input:focus { outline: none; border-color: var(--plum); box-shadow: 0 0 0 3px rgba(91,42,111,0.12); }
.ph-input::placeholder { color: var(--pebble); }

.ph-label { display: block; font-size: 13px; font-weight: 500; color: var(--graphite); margin-bottom: 6px; letter-spacing: 0.01em; }

.ph-card {
  background: var(--white); border-radius: var(--r-card);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .22s var(--ease-out), transform .22s var(--ease-out);
}
.ph-card--hover:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.ph-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
}
.ph-badge--plum { background: rgba(91,42,111,0.10); color: var(--plum); }
.ph-badge--honey { background: rgba(244,185,66,0.18); color: var(--honey-deep); }
.ph-badge--sage { background: rgba(143,185,150,0.22); color: var(--sage-deep); }
.ph-badge--rose { background: rgba(232,180,184,0.3); color: var(--rose-deep); }
.ph-badge--cream { background: var(--cream-deep); color: var(--graphite); }

/* Display type utilities */
.t-display { font-family: var(--f-display); font-weight: 400; letter-spacing: -0.02em; line-height: 1.04; }
.t-display-italic { font-family: var(--f-display); font-style: italic; font-weight: 400; letter-spacing: -0.01em; }
.t-hand { font-family: var(--f-hand); font-weight: 500; letter-spacing: 0; }
.t-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--plum); }

/* Decorative sparkle helper */
.sparkle { display: inline-block; }

/* Reveal animation for step 6 */
@keyframes book-reveal {
  0% { opacity: 0; transform: translateY(30px) scale(0.92) rotateY(-15deg); filter: blur(8px); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotateY(0); filter: blur(0); }
}
@keyframes sparkle-float {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
  50% { transform: translateY(-8px) scale(1.12); opacity: 1; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes dash-pulse {
  0%, 100% { border-color: var(--plum); }
  50% { border-color: var(--honey); }
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-fade-slide { animation: fadeSlide .4s var(--ease-out) both; }

</style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });

const LangContext = React.createContext({ lang: "fr", setLang: () => {} });

function useT() {
  const { lang } = React.useContext(LangContext);
  const t = React.useCallback((key) => {
    const parts = key.split(".");
    let v = I18N;
    for (const p of parts) v = v && v[p];
    if (!v) return key;
    if (typeof v === "object" && (v.fr || v.en)) return v[lang] ?? v.fr ?? key;
    return v;
  }, [lang]);
  return { t, lang };
}

Object.assign(window, { I18N, LangContext, useT });

      <path d="M12 3l2.5 5.5L20 9.5l-4 4 1 5.5L12 16.5 7 19l1-5.5-4-4 5.5-1L12 3z"/>
    </svg>
  ),
  leaf: ({ size = 22, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M4 20c0-8 6-14 16-14 0 10-6 16-14 16l-2-2z"/><path d="M4 20c4-4 8-7 12-9"/></svg>
  ),
  play: ({ size = 14, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill={color}><path d="M5 3v10l8-5z"/></svg>
  ),
  plus: ({ size = 16, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round"><path d="M8 3v10M3 8h10"/></svg>
  ),
  arrow: ({ size = 16, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
  ),
};

// Swirl/decorative SVG used as background accents
function Swirl({ w = 120, color = "#5B2A6F", opacity = 0.15, style }) {
  return (
    <svg width={w} height={w * 0.45} viewBox="0 0 120 54" fill="none" style={{ opacity, ...style }}>
      <path d="M2 40 C 20 20, 40 20, 60 36 C 80 52, 100 52, 118 32" stroke={color} strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      <circle cx="118" cy="32" r="2" fill={color}/>
      <path d="M8 48 L12 44 M14 50 L18 46" stroke={color} strokeWidth="1.2" strokeLinecap="round"/>
    </svg>
  );
}

// Star field decorative — for loading, reveal, hero
function StarField({ count = 16, size = 1.5, color = "#F4B942", style }) {
  const pts = React.useMemo(() =>
    Array.from({ length: count }, (_, i) => ({
      x: (i * 37.13) % 100,
      y: (i * 61.7 + 11) % 100,
      s: (((i * 17) % 10) / 10) * size + size * 0.4,
      d: (i * 0.4) % 3,
    })), [count, size]);
  return (
    <div style={{ position: "absolute", inset: 0, pointerEvents: "none", ...style }}>
      {pts.map((p, i) => (
        <span key={i} style={{
          position: "absolute", left: `${p.x}%`, top: `${p.y}%`,
          width: p.s * 2, height: p.s * 2, borderRadius: "50%",
          background: color, boxShadow: `0 0 ${p.s * 3}px ${color}`,
          animation: `sparkle-float 3.4s ease-in-out ${p.d}s infinite`,
        }} />
      ))}
    </div>
  );
}

// Placeholder avatar — soft circle with initial
function Avatar({ name = "?", size = 36, color = "var(--plum)", bg = "rgba(91,42,111,0.12)" }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      width: size, height: size, borderRadius: "50%", background: bg, color,
      fontFamily: "var(--f-display)", fontSize: size * 0.44, fontWeight: 500,
      flexShrink: 0,
    }}>{String(name).trim()[0] || "?"}</span>
  );
}

  <script type="text/babel" data-presets="react">
// Preview Flow — 7 steps. Fully interactive with real state.
function PreviewFlow({ onClose, mobile = false, initialStep = 1 }) {
  const { t, lang } = useT();
  const { setLang } = React.useContext(LangContext);
  const [step, setStep] = React.useState(initialStep);
  const [data, setData] = React.useState({
    book: I18N.books[4], // Lantern
    name: "Léo",
    age: 5,
    gender: "boy",
    skin: 2,
    bookLang: lang,
    photo: null,
    generated: false,
    pageChoices: {}, // { pageNum: variantIdx }
    format: "hard",
  });
  const set = (patch) => setData(d => ({ ...d, ...patch }));

  const totalSteps = 7;
  const next = () => setStep(s => Math.min(totalSteps, s + 1));
  const back = () => setStep(s => Math.max(1, s - 1));

  return (
    <div style={{ width: "100%", height: "100%", background: "var(--paper)", display: "flex", flexDirection: "column", fontFamily: "var(--f-body)", color: "var(--ink)", overflow: "hidden" }}>
      {/* Top bar */}
      <div style={{ borderBottom: "1px solid var(--bone)", padding: mobile ? "14px 16px" : "18px 40px", display: "flex", alignItems: "center", gap: 16, background: "var(--paper)", flexShrink: 0 }}>
        <PHLogo size={mobile ? 18 : 20} color="var(--plum-deep)" />
        <div style={{ flex: 1, marginLeft: mobile ? 12 : 40 }}>
          <StepRail step={step} total={totalSteps} mobile={mobile} />
        </div>
        <button onClick={() => setLang(lang === "fr" ? "en" : "fr")} style={{ background: "transparent", border: "1px solid var(--bone)", borderRadius: 999, padding: "5px 10px", fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", color: "var(--graphite)", cursor: "pointer" }}>
          {lang === "fr" ? "EN" : "FR"}
        </button>
        <button onClick={onClose} style={{ background: "transparent", border: 0, cursor: "pointer", color: "var(--stone)", padding: 6, display: "flex" }}>
          <Icon.close size={18} />
        </button>
      </div>

      {/* Step content */}
      <div className="artboard-scroll" style={{ flex: 1, overflowY: "auto" }}>
        <div key={step} className="anim-fade-slide" style={{ padding: mobile ? "24px 16px 32px" : "48px 40px 56px", maxWidth: mobile ? "100%" : 880, margin: "0 auto" }}>
          {step === 1 && <Step1 data={data} onNext={next} mobile={mobile} />}
          {step === 2 && <Step2 data={data} set={set} onNext={next} mobile={mobile} />}
          {step === 3 && <Step3 data={data} set={set} onNext={next} mobile={mobile} />}
          {step === 4 && <Step4 data={data} set={set} onNext={next} mobile={mobile} />}
          {step === 5 && <Step5 data={data} set={set} onNext={next} mobile={mobile} />}
          {step === 6 && <Step6 data={data} onNext={next} onEdit={() => setStep(5)} mobile={mobile} />}
          {step === 7 && <Step7 data={data} set={set} onClose={onClose} mobile={mobile} />}
        </div>
      </div>

      {/* Bottom bar */}
      {step > 1 && step !== 4 && (
        <div style={{ borderTop: "1px solid var(--bone)", padding: mobile ? "12px 16px" : "16px 40px", display: "flex", justifyContent: "space-between", background: "var(--paper)", flexShrink: 0 }}>
          <button className="ph-btn ph-btn--ghost" onClick={back}>
            <Icon.chev dir="left" size={14} /> {t("flow.back")}
          </button>
          <div style={{ fontSize: 12, color: "var(--stone)", alignSelf: "center", display: mobile ? "none" : "block" }}>
            {t("flow.progress")} {step} {t("flow.of")} {totalSteps}
          </div>
        </div>
      )}
    </div>
  );
}

// Step rail — pill progress with step labels
function StepRail({ step, total, mobile }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
      {Array.from({ length: total }, (_, i) => {
        const n = i + 1;
        const active = n === step;
        const done = n < step;
        return (
          <React.Fragment key={n}>
            <div style={{
              display: "flex", alignItems: "center", gap: 8,
              padding: mobile ? 0 : (active ? "6px 14px 6px 8px" : "6px 8px"),
              background: active ? "rgba(91,42,111,0.08)" : "transparent",
              borderRadius: 999,
              transition: "all .25s var(--ease-out)",
            }}>
              <span style={{
                width: mobile ? 22 : 24, height: mobile ? 22 : 24, borderRadius: "50%",
                background: done ? "var(--plum)" : active ? "var(--honey)" : "transparent",
                border: !done && !active ? "1.5px solid var(--pebble)" : "none",
                display: "flex", alignItems: "center", justifyContent: "center",
                color: done ? "var(--cream)" : active ? "var(--ink)" : "var(--stone)",
                fontSize: 12, fontWeight: 600, flexShrink: 0,
              }}>
                {done ? <Icon.check size={11} color="var(--cream)" /> : n}
              </span>
              {active && !mobile && <span style={{ fontSize: 13, fontWeight: 500, color: "var(--plum)" }}>{stepName(n)}</span>}
            </div>
            {n < total && <div style={{ width: mobile ? 4 : 14, height: 1, background: "var(--pebble)", opacity: 0.5 }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}
function stepName(n) {
  const names = { 1: "Histoire", 2: "Enfant", 3: "Photo", 4: "Magie", 5: "Pages", 6: "Aperçu", 7: "Commande" };
  return names[n];
}

// ──────── Step 4 — Generation ────────
function Step4({ data, set, onNext, mobile }) {
  const { t } = useT();
  const [progress, setProgress] = React.useState(0);
  const [phase, setPhase] = React.useState(1);
  const [email, setEmail] = React.useState("");
  const [emailSent, setEmailSent] = React.useState(false);

  React.useEffect(() => {
    const iv = setInterval(() => {
      setProgress(p => {
        const np = Math.min(100, p + 1.2);
        setPhase(np < 30 ? 1 : np < 65 ? 2 : np < 95 ? 3 : 4);
        if (np >= 100) { clearInterval(iv); setTimeout(() => { set({ generated: true }); onNext(); }, 600); }
        return np;
      });
    }, 60);
    return () => clearInterval(iv);
  }, []);

  const phaseKey = `flow.s4_title_${phase}`;

  return (
    <div style={{ textAlign: "center", padding: mobile ? "20px 0" : "40px 0" }}>
      {/* Magical illustration */}
      <div style={{ position: "relative", width: mobile ? 220 : 280, height: mobile ? 220 : 280, margin: "0 auto 32px" }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, rgba(244,185,66,0.3), transparent 60%)", animation: "sparkle-float 2.4s ease-in-out infinite" }} />
        <StarField count={14} color="var(--honey)" />
        {/* Rotating book */}
        <div style={{ position: "absolute", inset: "18%", background: "var(--plum-deep)", borderRadius: 4, boxShadow: "0 12px 32px rgba(30,20,30,0.3)", display: "flex", alignItems: "center", justifyContent: "center", animation: "spin-slow 8s linear infinite" }}>
          <Sparkle size={32} color="var(--honey)" />
        </div>
      </div>

      <h1 key={phase} className="t-display anim-fade-slide" style={{ fontSize: mobile ? 28 : 40, color: "var(--plum-deep)", margin: "0 0 10px" }}>
        {t(phaseKey)}
      </h1>
      <p style={{ fontSize: 15, color: "var(--stone)", margin: "0 0 28px" }}>{t("flow.s4_eta")}</p>

      {/* Progress bar */}
      <div style={{ maxWidth: 420, margin: "0 auto 36px" }}>
        <div style={{ height: 8, background: "var(--bone)", borderRadius: 999, overflow: "hidden", position: "relative" }}>
          <div style={{
            height: "100%", width: `${progress}%`,
            background: "linear-gradient(90deg, var(--plum) 0%, var(--honey) 50%, var(--plum) 100%)",
            backgroundSize: "200% 100%",
            animation: "shimmer 2s linear infinite",
            borderRadius: 999, transition: "width .2s linear",
          }} />
        </div>
        <div style={{ fontSize: 12, color: "var(--stone)", marginTop: 8, fontVariantNumeric: "tabular-nums" }}>{Math.round(progress)}%</div>
      </div>

      {/* Email capture */}
      <div style={{ background: "var(--cream-deep)", borderRadius: 14, padding: mobile ? "20px 16px" : "24px 28px", maxWidth: 480, margin: "0 auto", textAlign: "left" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "var(--plum-deep)", marginBottom: 4 }}>{t("flow.s4_sub")}</div>
        {emailSent ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--success)", fontSize: 14, marginTop: 10 }}>
            <Icon.check size={14} color="var(--success)" /> {email}
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <input className="ph-input" placeholder={t("flow.s4_email_ph")} value={email} onChange={e => setEmail(e.target.value)} style={{ flex: 1 }} />
            <button className="ph-btn ph-btn--primary ph-btn--sm" onClick={() => email.includes("@") && setEmailSent(true)}>{t("flow.s4_email_btn")}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ──────── Step 5 — Page-by-page review ────────
function Step5({ data, set, onNext, mobile }) {
  const { t, lang } = useT();
  const totalPages = 8; // reduced for demo
  const [page, setPage] = React.useState(1);

  const variantsForPage = (p) => {
    // Generate 4 variants using different palettes
    const palettes = [
      ["#5B2A6F", "#F4B942", "#FFF8EC"],
      ["#3F1C4F", "#E8B4B8", "#FFF8EC"],
      ["#2E5E7E", "#F4B942", "#FFF8EC"],
      ["#8FB996", "#F4B942", "#FFF8EC"],
    ];
    return palettes.map((p, i) => ({ id: i, palette: p }));
  };

  const variants = variantsForPage(page);
  const chosen = data.pageChoices[page] ?? 0;

  const choose = (v) => set({ pageChoices: { ...data.pageChoices, [page]: v } });

  const goNextPage = () => {
    if (page < totalPages) setPage(page + 1);
    else onNext();
  };

  const skipRest = () => {
    const choices = { ...data.pageChoices };
    for (let p = page; p <= totalPages; p++) if (choices[p] === undefined) choices[p] = 0;
    set({ pageChoices: choices });
    onNext();
  };

  return (
    <div>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div className="t-eyebrow">{t("flow.s5_eyebrow")}</div>
        <h1 className="t-display" style={{ fontSize: mobile ? 28 : 38, color: "var(--plum-deep)", margin: "12px 0 8px" }}>{t("flow.s5_title")}</h1>
        <div style={{ fontSize: 14, color: "var(--stone)" }}>{t("flow.s5_page")} {page} {t("flow.of")} {totalPages}</div>
      </div>

      {/* Main selected page */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
        <BookPageSpread palette={variants[chosen].palette} name={data.name} pageNum={page} lang={lang} size={mobile ? 280 : 420} />
      </div>

      {/* Variant thumbnails */}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 28, flexWrap: "wrap" }}>
        {variants.map(v => (
          <button key={v.id} onClick={() => choose(v.id)}
            style={{
              padding: 0, border: v.id === chosen ? "3px solid var(--plum)" : "3px solid transparent",
              borderRadius: 8, cursor: "pointer", background: "transparent", transition: "transform .15s",
              transform: v.id === chosen ? "scale(1.04)" : "scale(1)",
            }}>
            <BookPageSpread palette={v.palette} name={data.name} pageNum={page} lang={lang} size={mobile ? 92 : 120} />
          </button>
        ))}
      </div>

      {/* Nav */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <button className="ph-btn ph-btn--ghost">{t("flow.s5_regen")}</button>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="ph-btn ph-btn--ghost" onClick={skipRest}>{t("flow.s5_skip")}</button>
          <button className="ph-btn ph-btn--primary" onClick={goNextPage}>
            {page < totalPages ? t("flow.s5_next") : t("flow.s5_done")} <Icon.arrow size={13} />
          </button>
        </div>
      </div>
    </div>
  );
}

// A stylized book page spread rendered in SVG
function BookPageSpread({ palette, name, pageNum, lang, size = 420 }) {
  const [primary, accent, bg] = palette;
  const h = size * 0.72;
  // Different scene per page
  const scene = pageNum % 4;
  const copy = lang === "fr"
    ? ["Un soir,", `${name} entendit`, "un chuchotement", "dans le jardin…"]
    : ["One evening,", `${name} heard`, "a whisper", "from the garden…"];
  return (
    <div style={{ width: size, height: h, borderRadius: 4, overflow: "hidden", boxShadow: "0 10px 28px rgba(30,20,30,0.18)", background: bg, position: "relative", display: "flex" }}>
      {/* left page (illustration) */}
      <div style={{ width: "50%", height: "100%", background: primary, position: "relative", overflow: "hidden" }}>
        {scene === 0 && (
          <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <circle cx="78" cy="22" r="10" fill={accent} opacity="0.95"/>
            <path d="M0 80 Q25 60 50 75 T100 70 V100 H0Z" fill={accent} opacity="0.25"/>
            <circle cx="50" cy="65" r="8" fill={accent}/>
            <rect x="46" y="70" width="8" height="14" fill={accent}/>
            <path d="M20 40l2 2 2-2M72 48l2 2 2-2M10 20l1 1 1-1" stroke={accent} strokeWidth="1"/>
          </svg>
        )}
        {scene === 1 && (
          <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <path d="M0 70 Q30 55 60 62 T100 58 V100 H0Z" fill={accent} opacity="0.35"/>
            <path d="M15 85L10 60L18 60L14 48L22 48L17 36L28 36L22 24L40 24L32 36L42 36L38 48L48 48L42 60L52 60L46 85Z" fill={accent} opacity="0.85"/>
            <path d="M70 85L64 65L72 65L68 52L76 52L72 40L82 40L76 28L90 28L84 40L92 40L88 52L94 52L90 65L98 65L92 85Z" fill={accent} opacity="0.7"/>
          </svg>
        )}
        {scene === 2 && (
          <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <path d="M0 50 Q25 40 50 48 T100 46" stroke={accent} strokeWidth="1.6" fill="none" opacity="0.6"/>
            <path d="M0 62 Q25 52 50 60 T100 58" stroke={accent} strokeWidth="1.6" fill="none" opacity="0.5"/>
            <path d="M0 74 Q25 64 50 72 T100 70" stroke={accent} strokeWidth="1.6" fill="none" opacity="0.4"/>
            <path d="M50 24 C44 24 40 28 40 34 C40 42 50 48 50 48 C50 48 60 42 60 34 C60 28 56 24 50 24Z" fill={accent}/>
          </svg>
        )}
        {scene === 3 && (
          <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <rect x="20" y="20" width="60" height="70" rx="3" fill={accent} opacity="0.2"/>
            <path d="M30 35 Q50 30 70 35 V80 Q50 75 30 80Z" fill={accent} opacity="0.85"/>
            <circle cx="50" cy="20" r="3" fill={accent}/>
            <path d="M18 15l2 2-2 2M82 18l-2 2 2 2" stroke={accent} strokeWidth="1"/>
          </svg>
        )}
      </div>
      {/* right page (text) */}
      <div style={{ width: "50%", height: "100%", position: "relative", padding: size * 0.05, display: "flex", flexDirection: "column", justifyContent: "center" }}>
        <div style={{ fontFamily: "var(--f-display)", fontSize: size * 0.045, lineHeight: 1.4, color: primary, letterSpacing: "-0.01em", textWrap: "balance" }}>
          {copy.map((c, i) => <div key={i}>{c}</div>)}
        </div>
        <div style={{ position: "absolute", bottom: size * 0.03, right: size * 0.05, fontSize: size * 0.024, color: primary, opacity: 0.5, fontFamily: "var(--f-body)", fontVariantNumeric: "tabular-nums" }}>
          {pageNum}
        </div>
      </div>
      {/* center spine shadow */}
      <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 8, transform: "translateX(-50%)", background: "linear-gradient(90deg, transparent, rgba(0,0,0,0.12), transparent)", pointerEvents: "none" }} />
    </div>
  );
}

// ──────── Step 6 — Reveal ────────
function Step6({ data, onNext, onEdit, mobile }) {
  const { t, lang } = useT();
  const [revealed, setRevealed] = React.useState(false);
  const [pageIdx, setPageIdx] = React.useState(0);
  const [flipping, setFlipping] = React.useState(false);
  const totalPages = 8;

  React.useEffect(() => {
    setTimeout(() => setRevealed(true), 200);
  }, []);

  const palettes = [
    ["#5B2A6F", "#F4B942", "#FFF8EC"],
    ["#3F1C4F", "#E8B4B8", "#FFF8EC"],
    ["#2E5E7E", "#F4B942", "#FFF8EC"],
    ["#8FB996", "#F4B942", "#FFF8EC"],
  ];
  const paletteFor = (p) => palettes[(data.pageChoices[p] ?? 0) % palettes.length];

  const flip = (dir) => {
    if (flipping) return;
    const next = pageIdx + dir;
    if (next < 0 || next >= totalPages) return;
    setFlipping(true);
    setTimeout(() => { setPageIdx(next); setFlipping(false); }, 280);
  };

  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ marginBottom: 20 }}>
        <div className="t-eyebrow">{t("flow.s6_eyebrow")}</div>
        <h1 className="t-display" style={{ fontSize: mobile ? 30 : 44, color: "var(--plum-deep)", margin: "12px 0 8px", letterSpacing: "-0.02em" }}>
          {t("flow.s6_title").replace("{name}", data.name)}
        </h1>
        <p style={{ fontSize: 15, color: "var(--stone)", margin: 0 }}>{t("flow.s6_sub")}</p>
      </div>

      {/* Flipbook */}
      <div style={{ position: "relative", padding: "40px 0 20px", display: "flex", justifyContent: "center", perspective: 1800 }}>
        {revealed && <StarField count={14} color="var(--honey)" style={{ opacity: 0.6 }} />}
        <div style={{
          position: "relative",
          animation: revealed ? "book-reveal 1s cubic-bezier(0.2,0.7,0.3,1) both" : "none",
          transformStyle: "preserve-3d",
        }}>
          <div style={{ transform: flipping ? "rotateY(-8deg)" : "rotateY(0)", transition: "transform .28s var(--ease-out)" }}>
            <BookPageSpread palette={paletteFor(pageIdx + 1)} name={data.name} pageNum={pageIdx + 1} lang={lang} size={mobile ? 320 : 560} />
          </div>
          {/* Flip arrows */}
          <button onClick={() => flip(-1)} disabled={pageIdx === 0} style={arrowBtn("left", pageIdx === 0)}><Icon.chev dir="left" color="var(--plum)" /></button>
          <button onClick={() => flip(1)} disabled={pageIdx === totalPages - 1} style={arrowBtn("right", pageIdx === totalPages - 1)}><Icon.chev dir="right" color="var(--plum)" /></button>
        </div>
      </div>

      {/* Page dots */}
      <div style={{ display: "flex", justifyContent: "center", gap: 6, margin: "12px 0 24px" }}>
        {Array.from({ length: totalPages }, (_, i) => (
          <button key={i} onClick={() => setPageIdx(i)} aria-label={`Page ${i + 1}`}
            style={{ width: i === pageIdx ? 22 : 7, height: 7, borderRadius: 999, background: i === pageIdx ? "var(--plum)" : "var(--pebble)", border: 0, padding: 0, cursor: "pointer", transition: "width .2s" }} />
        ))}
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <button className="ph-btn ph-btn--ghost" onClick={onEdit}>
          <Icon.camera size={14} color="var(--plum)" /> {t("flow.s6_edit")}
        </button>
        <button className="ph-btn ph-btn--secondary">{t("flow.s6_share")}</button>
        <button className="ph-btn ph-btn--primary ph-btn--lg" onClick={onNext}>{t("flow.s6_cta")} <Icon.arrow size={14} /></button>
      </div>
    </div>
  );
}
function arrowBtn(dir, disabled) {
  return {
    position: "absolute",
    top: "50%", [dir]: -24, transform: "translateY(-50%)",
    width: 44, height: 44, borderRadius: "50%",
    border: "1px solid var(--bone)", background: "#fff", boxShadow: "var(--shadow-sm)",
    cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.4 : 1,
    display: "flex", alignItems: "center", justifyContent: "center",
  };
}

// ──────── Step 7 — Order ────────
function Step7({ data, set, onClose, mobile }) {
  const { t, lang } = useT();
  const prices = { hard: 54.99, soft: 39.99 };
  const shipping = 0;
  const subtotal = prices[data.format];
  const tax = subtotal * 0.14975;
  const total = subtotal + shipping + tax;

  return (
    <div>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div className="t-eyebrow">{t("flow.s7_eyebrow")}</div>
        <h1 className="t-display" style={{ fontSize: mobile ? 32 : 44, color: "var(--plum-deep)", margin: "12px 0 0" }}>{t("flow.s7_title")}</h1>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 28 }}>
        {[
          { id: "hard", price: 54.99, t: t("flow.s7_hard"), d: t("flow.s7_hard_d"), recommended: true },
          { id: "soft", price: 39.99, t: t("flow.s7_soft"), d: t("flow.s7_soft_d"), recommended: false },
        ].map(f => {
          const sel = data.format === f.id;
          return (
            <button key={f.id} onClick={() => set({ format: f.id })}
              style={{
                textAlign: "left", padding: 24, borderRadius: 16,
                border: sel ? "2px solid var(--plum)" : "2px solid var(--bone)",
                background: sel ? "rgba(91,42,111,0.03)" : "#fff",
                cursor: "pointer", fontFamily: "var(--f-body)", color: "var(--ink)", position: "relative",
              }}>
              {f.recommended && <span style={{ position: "absolute", top: -10, left: 20, background: "var(--honey)", color: "var(--ink)", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", padding: "3px 10px", borderRadius: 999 }}>{t("flow.s7_recommended")}</span>}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div className="t-display" style={{ fontSize: 22, color: "var(--ink)" }}>{f.t}</div>
                <div style={{ fontFamily: "var(--f-display)", fontSize: 26, color: "var(--plum-deep)" }}>${f.price}</div>
              </div>
              <div style={{ fontSize: 13, color: "var(--stone)", lineHeight: 1.5 }}>{f.d}</div>
              <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 18, height: 18, borderRadius: "50%", border: sel ? "5px solid var(--plum)" : "1.5px solid var(--pebble)", background: sel ? "#fff" : "transparent", transition: "all .15s" }} />
                <span style={{ fontSize: 13, color: sel ? "var(--plum)" : "var(--stone)", fontWeight: sel ? 600 : 400 }}>{sel ? (lang === "fr" ? "Sélectionné" : "Selected") : (lang === "fr" ? "Choisir" : "Choose")}</span>
              </div>
            </button>
          );
        })}
      </div>

      {/* Summary */}
      <div style={{ background: "var(--cream)", borderRadius: 14, padding: 24 }}>
        <div style={{ fontSize: 13, color: "var(--stone)", marginBottom: 4 }}>{t("flow.s7_ship_to")} Montréal, QC · <b style={{ color: "var(--sage-deep)", fontWeight: 600 }}>{t("flow.s7_ship_free")}</b></div>
        <div style={{ fontSize: 13, color: "var(--stone)", marginBottom: 16 }}>{t("flow.s7_eta")} <b style={{ color: "var(--ink)", fontWeight: 600 }}>28 avril — 2 mai</b></div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, borderTop: "1px solid var(--bone)", paddingTop: 14 }}>
          {[
            [t("flow.s7_subtotal"), `${subtotal.toFixed(2)}`],
            [t("flow.s7_shipping"), lang === "fr" ? "Gratuite" : "Free"],
            [t("flow.s7_taxes"), `${tax.toFixed(2)}`],
          ].map(([l, v]) => (
            <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 14, color: "var(--graphite)" }}>
              <span>{l}</span><span style={{ fontVariantNumeric: "tabular-nums" }}>{v}</span>
            </div>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 18, color: "var(--ink)", fontWeight: 600, marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--bone)" }}>
            <span>{t("flow.s7_total")}</span><span style={{ fontVariantNumeric: "tabular-nums" }}>${total.toFixed(2)}</span>
          </div>
        </div>
        <div style={{ marginTop: 16, fontSize: 13, color: "var(--plum)", cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
          <Icon.plus size={13} color="var(--plum)" /> {t("flow.s7_gift")}
        </div>
      </div>

      <div style={{ marginTop: 24, textAlign: "center" }}>
        <button className="ph-btn ph-btn--primary ph-btn--lg" onClick={onClose}>
          <Icon.cart size={16} color="var(--ink)" /> {t("flow.s7_cta")} · ${total.toFixed(2)}
        </button>
        <div style={{ fontSize: 12, color: "var(--stone)", marginTop: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
          <Icon.shield size={13} color="var(--sage-deep)" /> {lang === "fr" ? "Paiement sécurisé · Visa, Mastercard, Apple Pay, PayPal" : "Secure checkout · Visa, Mastercard, Apple Pay, PayPal"}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { PreviewFlow });

</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "editorial",
      "defaultLang": "fr",
      "showFlowOverlay": false,
      "initialFlowStep": 1
    }/*EDITMODE-END*/;

    function PetitsHerosApp() {
      const { LangContext, I18N } = window;
      const [tweaks, setTweaks] = React.useState(TWEAKS_DEFAULTS);
      const [lang, setLang] = React.useState(() => localStorage.getItem("ph-lang") || TWEAKS_DEFAULTS.defaultLang);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [flow, setFlow] = React.useState({ open: false, mobile: false, step: 1 });

      React.useEffect(() => { localStorage.setItem("ph-lang", lang); document.documentElement.lang = lang; }, [lang]);

      // Tweaks protocol
      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === "__activate_edit_mode") setTweaksOpen(true);
          if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const setTweak = (k, v) => {
        setTweaks(t => {
          const next = { ...t, [k]: v };
          window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
          return next;
        });
      };

      const openFlow = (mobile = false, step = 1) => setFlow({ open: true, mobile, step });
      const closeFlow = () => setFlow(f => ({ ...f, open: false }));

      return (
        <LangContext.Provider value={{ lang, setLang }}>
          <DesignCanvas>
            <DCSection id="system" title="Design System" subtitle="Colors, typography, components — the ingredients for everything else.">
              <DCArtboard id="tokens" label="Tokens · v0.1" width={1200} height={1680}>
                <DesignSystemArtboard />
              </DCArtboard>
            </DCSection>

            <DCSection id="home" title="Homepage" subtitle="Desktop · 1440 · Toggle hero variants in Tweaks.">
              <DCArtboard id="hp-desktop" label="Homepage · Desktop" width={1440} height={3600}>
                <HomepageArtboard heroVariant={tweaks.heroVariant} onOpenFlow={() => openFlow(false, 1)} />
              </DCArtboard>
            </DCSection>

            <DCSection id="flow-desktop" title="Preview Flow · Desktop" subtitle="7 steps. Fully interactive — click any card to open fullscreen and drive the flow.">
              <DCArtboard id="fd-1" label="1 · Welcome" width={900} height={640}>
                <FlowStage step={1} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-2" label="2 · Child details" width={900} height={640}>
                <FlowStage step={2} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-3" label="3 · Photo upload" width={900} height={640}>
                <FlowStage step={3} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-4" label="4 · Generation" width={900} height={640}>
                <FlowStage step={4} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-5" label="5 · Page review" width={900} height={640}>
                <FlowStage step={5} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-6" label="6 · Reveal ✨" width={900} height={640}>
                <FlowStage step={6} mobile={false} />
              </DCArtboard>
              <DCArtboard id="fd-7" label="7 · Order" width={900} height={640}>
                <FlowStage step={7} mobile={false} />
              </DCArtboard>
            </DCSection>

            <DCSection id="flow-mobile" title="Preview Flow · Mobile" subtitle="iPhone · 390 · Same flow, responsive layout.">
              {[1,2,3,4,5,6,7].map(n => (
                <DCArtboard key={n} id={`fm-${n}`} label={`${n} · ${["Welcome","Child","Photo","Magic","Pages","Reveal","Order"][n-1]}`} width={390} height={780}>
                  <PhoneFrame><FlowStage step={n} mobile={true} /></PhoneFrame>
                </DCArtboard>
              ))}
            </DCSection>
          </DesignCanvas>

          {/* Full-bleed flow overlay */}
          {flow.open && (
            <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(30,20,30,0.72)", backdropFilter: "blur(16px)", display: "flex", alignItems: "center", justifyContent: "center", padding: flow.mobile ? 0 : 40, animation: "fadeSlide .3s" }}>
              <div style={{
                width: flow.mobile ? "100%" : "min(1100px, 100%)",
                height: flow.mobile ? "100%" : "min(760px, 100%)",
                borderRadius: flow.mobile ? 0 : 24,
                overflow: "hidden", boxShadow: "0 40px 120px rgba(0,0,0,0.5)", background: "var(--paper)",
              }}>
                <PreviewFlow onClose={closeFlow} mobile={flow.mobile} initialStep={flow.step} />
              </div>
            </div>
          )}

          {/* Tweaks panel */}
          {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} openFlow={openFlow} />}
        </LangContext.Provider>
      );
    }

    // Render a single step of the flow isolated — used in canvas artboards
    function FlowStage({ step, mobile }) {
      const [localStep, setLocalStep] = React.useState(step);
      React.useEffect(() => { setLocalStep(step); }, [step]);
      return <PreviewFlow onClose={() => {}} mobile={mobile} initialStep={localStep} key={step} />;
    }

    // Phone frame for mobile artboards
    function PhoneFrame({ children }) {
      return (
        <div style={{ width: "100%", height: "100%", background: "#1a1510", display: "flex", alignItems: "center", justifyContent: "center", padding: 14 }}>
          <div style={{ width: 362, height: 752, borderRadius: 42, background: "#000", padding: 8, boxShadow: "inset 0 0 0 1px rgba(255,255,255,0.05)" }}>
            <div style={{ width: "100%", height: "100%", borderRadius: 34, overflow: "hidden", background: "var(--paper)", position: "relative" }}>
              {/* Notch */}
              <div style={{ position: "absolute", top: 8, left: "50%", transform: "translateX(-50%)", width: 110, height: 28, background: "#000", borderRadius: 20, zIndex: 100 }} />
              <div style={{ width: "100%", height: "100%" }}>{children}</div>
            </div>
          </div>
        </div>
      );
    }

    // Tweaks panel — floating bottom-right
    function TweaksPanel({ tweaks, setTweak, openFlow }) {
      const { lang, setLang } = React.useContext(LangContext);
      const row = (label, children) => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--stone)", marginBottom: 6 }}>{label}</div>
          {children}
        </div>
      );
      const seg = (value, options, onChange) => (
        <div style={{ display: "flex", background: "var(--bone)", borderRadius: 999, padding: 3 }}>
          {options.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)}
              style={{
                flex: 1, padding: "7px 10px", borderRadius: 999, border: 0,
                background: value === o.v ? "#fff" : "transparent",
                color: value === o.v ? "var(--plum-deep)" : "var(--graphite)",
                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "var(--f-body)",
                boxShadow: value === o.v ? "var(--shadow-xs)" : "none",
              }}>{o.l}</button>
          ))}
        </div>
      );

      return (
        <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 300, background: "#fff", borderRadius: 16, padding: 20, width: 280, boxShadow: "var(--shadow-lg)", fontFamily: "var(--f-body)", color: "var(--ink)", border: "1px solid var(--bone)" }}>
          <div className="t-display" style={{ fontSize: 20, color: "var(--plum-deep)", marginBottom: 4 }}>Tweaks</div>
          <div style={{ fontSize: 12, color: "var(--stone)", marginBottom: 18 }}>Adjust the design in place.</div>

          {row("Hero variant", seg(tweaks.heroVariant, [
            { v: "editorial", l: "Editorial" },
            { v: "storybook", l: "Storybook" },
            { v: "collage", l: "Collage" },
          ], v => setTweak("heroVariant", v)))}

          {row("Language", seg(lang, [
            { v: "fr", l: "Français" },
            { v: "en", l: "English" },
          ], v => setLang(v)))}

          {row("Open preview flow", (
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => openFlow(false, 1)} className="ph-btn ph-btn--secondary" style={{ flex: 1, fontSize: 12, padding: "9px 10px" }}>Desktop</button>
              <button onClick={() => openFlow(true, 1)} className="ph-btn ph-btn--secondary" style={{ flex: 1, fontSize: 12, padding: "9px 10px" }}>Mobile</button>
            </div>
          ))}

          <div style={{ fontSize: 11, color: "var(--stone)", marginTop: 6, lineHeight: 1.5 }}>
            Tip: click the <b style={{ color: "var(--plum)" }}>↗</b> on any artboard to open it fullscreen.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PetitsHerosApp />);
  </script>
</body>
</html>
